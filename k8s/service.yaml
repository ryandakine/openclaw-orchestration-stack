apiVersion: v1
kind: Service
metadata:
  name: openclaw-api
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/component: api
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-n8n
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw-n8n
    app.kubernetes.io/component: n8n
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: openclaw-n8n
    app.kubernetes.io/component: n8n
