apiVersion: v1
kind: Secret
metadata:
  name: openclaw-secrets
  namespace: openclaw
type: Opaque
stringData:
  # API Keys - REPLACE THESE VALUES
  OPENCLAW_API_KEY: "your-secure-api-key-here"
  ANTHROPIC_API_KEY: "your-anthropic-api-key"
  OPENAI_API_KEY: "your-openai-api-key"
  
  # GitHub
  GITHUB_API_KEY: "your-github-token"
  GITHUB_WEBHOOK_SECRET: "your-webhook-secret"
  
  # n8n
  N8N_BASIC_AUTH_USER: "admin"
  N8N_BASIC_AUTH_PASSWORD: "your-n8n-password"
---
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-tls
  namespace: openclaw
type: kubernetes.io/tls
data:
  # Base64-encoded TLS certificate and key
  # Generate with: kubectl create secret tls openclaw-tls --cert=cert.pem --key=key.pem --dry-run=client -o yaml
  tls.crt: ""
  tls.key: ""
