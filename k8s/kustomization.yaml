apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openclaw

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml

commonLabels:
  app.kubernetes.io/part-of: openclaw
  app.kubernetes.io/managed-by: kustomize

images:
  - name: openclaw/api
    newTag: v1.0.0
  - name: openclaw/worker
    newTag: v1.0.0
  - name: openclaw/n8n
    newTag: v1.0.0

configMapGenerator:
  - name: openclaw-config
    behavior: merge
    literals:
      - ENVIRONMENT=production

secretGenerator:
  - name: openclaw-secrets
    behavior: merge
    envs:
      - secrets.env
