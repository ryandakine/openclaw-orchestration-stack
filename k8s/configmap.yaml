apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
data:
  ENVIRONMENT: "production"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  PORT: "8000"
  HOST: "0.0.0.0"
  OPENCLAW_DB_PATH: "/data/openclaw.db"
  MAX_WORKERS: "5"
  TASK_TIMEOUT: "300"
  LEASE_DURATION: "300"
  MAX_RETRIES: "3"
  POLL_INTERVAL: "5"
  N8N_HOST: "openclaw-n8n"
  N8N_PORT: "5678"
  N8N_PROTOCOL: "http"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-n8n-config
  namespace: openclaw
data:
  N8N_HOST: "0.0.0.0"
  N8N_PORT: "5678"
  N8N_PROTOCOL: "http"
  N8N_USER_FOLDER: "/home/n8n/.n8n"
  DB_TYPE: "sqlite"
  DB_SQLITE_PATH: "/home/n8n/.n8n/database.sqlite"
  EXECUTIONS_MODE: "regular"
  EXECUTIONS_TIMEOUT: "300"
  EXECUTIONS_TIMEOUT_MAX: "3600"
